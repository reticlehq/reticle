<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense Tracker — generated by Builder</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        max-width: 640px;
        color: #111;
      }
      input,
      select,
      button {
        padding: 0.4rem;
        margin: 0.2rem;
      }
      li {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid #eee;
        padding: 0.3rem 0;
      }
      #err {
        color: #c00;
      }
    </style>
  </head>
  <body>
    <h1>Expense Tracker</h1>
    <form id="add">
      <input id="amount" placeholder="amount" data-testid="amount" />
      <select id="category" data-testid="category">
        <option>food</option>
        <option>travel</option>
        <option>other</option>
      </select>
      <input id="note" placeholder="note" data-testid="note" />
      <button type="submit" data-testid="add">Add</button>
      <span id="err" data-testid="err" role="alert"></span>
    </form>
    <h2>Total: <span id="total" data-testid="total" role="status">0</span></h2>
    <ul id="list" data-testid="list"></ul>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
