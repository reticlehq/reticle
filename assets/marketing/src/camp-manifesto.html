<!--SIZE:1600x900-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1600px;height:900px}
  .card{width:1600px;height:900px;padding:var(--s16)}
  .top{display:flex;align-items:flex-start;justify-content:space-between}
  .mid{margin:auto 0;max-width:1180px}
  .eyebrow{color:var(--cyan)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.035em;line-height:1.02;font-size:88px;margin-top:var(--s5)}
  h1 .hi{--hi:rgba(95,217,245,.3)}
  .creed{margin-top:var(--s8);display:flex;flex-direction:column;gap:var(--s3)}
  .creed div{font-size:var(--t-md);font-weight:500;color:var(--muted);display:flex;align-items:center;gap:var(--s4)}
  .creed div .b{width:8px;height:8px;border-radius:50%;background:var(--cyan);flex:none}
  .creed div b{color:var(--ink);font-weight:600}
  .foot{display:flex;align-items:center;justify-content:space-between}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer">
      <div class="top">
        <span class="eyebrow">a small manifesto</span>
        <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      </div>
      <div class="mid">
        <h1>"Done" should<br />mean <span class="hi">done.</span></h1>
        <div class="creed">
          <div><span class="b"></span>We believe your AI should <b>prove its work</b>, not just promise it.</div>
          <div><span class="b"></span>We believe <b>you shouldn't be the test suite.</b></div>
          <div><span class="b"></span>We believe in trust, but <b>verify the agent.</b></div>
        </div>
      </div>
      <div class="foot">
        <span style="font-size:var(--t-base);font-weight:600;color:var(--muted)">Iris. Open source, for builders who ship verified.</span>
        <span class="url" style="font-family:var(--mono);font-size:var(--t-mono);color:var(--cyan);font-weight:700">syrin.ai/iris</span>
      </div>
    </div>
  </div>
</body></html>
