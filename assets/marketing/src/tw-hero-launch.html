<!--SIZE:1600x900-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1600px;height:900px}
  .card{width:1600px;height:900px;padding:var(--s16)}
  .eye{position:absolute;right:-120px;top:50%;transform:translateY(-50%);width:760px;height:760px;color:rgba(95,217,245,.10);z-index:0}
  .eye .ico{width:760px;height:760px;stroke-width:.5}
  .layer{justify-content:space-between}
  .top{display:flex;align-items:center;justify-content:space-between}
  .badge{font-size:var(--t-xs);font-weight:700;color:var(--cyan);border:1px solid rgba(95,217,245,.4);
    background:rgba(95,217,245,.08);border-radius:var(--rpill);padding:var(--s2) var(--s5)}
  .mid{margin:auto 0}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.035em;line-height:.98;font-size:128px}
  h1 .b{color:var(--red)}
  .lead{font-size:var(--t-md);color:var(--muted);margin-top:var(--s7);max-width:920px;line-height:1.5}
  .lead b{color:var(--ink);font-weight:600}
  .bottom{display:flex;align-items:center;justify-content:space-between}
  .cta{display:flex;align-items:center;gap:var(--s4)}
  .pill{display:flex;align-items:center;gap:var(--s3);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    border-radius:var(--r4);padding:var(--s4) var(--s6);font-family:var(--mono);font-size:var(--t-mono);font-weight:600}
  .pill .code{color:var(--cyan)}
  .url{font-family:var(--mono);font-size:var(--t-mono);color:var(--faint);font-weight:600}
</style></head><body>
  <div class="card bg-dark">
    <div class="eye"><svg class="ico" viewBox="0 0 24 24"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3.4"/></svg></div>
    <div class="grain"></div>
    <div class="layer">
      <div class="top">
        <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
        <span class="badge">open source · MIT</span>
      </div>
      <div class="mid">
        <h1>Your AI says it's done.<br /><span class="b">It isn't.</span></h1>
        <p class="lead">Meet Iris. It checks your coding agent's work inside the real running app, and only lets it say <b>done</b> when that's actually true.</p>
      </div>
      <div class="bottom">
        <div class="cta">
          <div class="pill"><span class="code">npm i -D @syrin/iris</span></div>
        </div>
        <span class="url">syrin.ai/iris</span>
      </div>
    </div>
  </div>
</body></html>
