<!--SIZE:1080x1350-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1350px}
  .card{width:1080px;height:1350px;padding:var(--s16)}
  .pov{font-family:var(--sans);font-weight:800;font-size:72px;letter-spacing:-.03em;line-height:1.06;margin-top:var(--s12)}
  .pov .y{color:var(--amber)}
  .stage{margin:auto 0;display:flex;flex-direction:column;gap:var(--s5)}
  .toast{display:flex;align-items:center;gap:var(--s4);background:rgba(70,214,160,.1);
    border:1px solid rgba(70,214,160,.45);border-radius:var(--r5);padding:var(--s6)}
  .toast .chk{flex:none;width:48px;height:48px;border-radius:50%;background:var(--green);color:#06231a;display:flex;align-items:center;justify-content:center}
  .toast .chk .ico{width:26px;height:26px;stroke-width:3}
  .toast .h{font-weight:700;font-size:var(--t-base);color:#cdf6e4}
  .peel{text-align:center;color:var(--faint);font-size:var(--t-xs)}
  .truth{background:rgba(255,107,134,.08);border:1px solid rgba(255,107,134,.42);border-radius:var(--r5);padding:var(--s6);display:flex;flex-direction:column;gap:var(--s3)}
  .truth .r{display:flex;align-items:center;gap:var(--s3);font-family:var(--mono);font-size:var(--t-xs);color:#ffd0da}
  .truth .ico{width:20px;height:20px;color:var(--red);flex:none}
  .truth b{color:#fff}
  .qa{font-weight:800;font-size:var(--t-lg);letter-spacing:-.03em;text-align:center}
  .qa .c{color:var(--cyan)}
  .end{display:flex;flex-direction:column;gap:var(--s4);align-items:center}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer" style="justify-content:space-between">
      <div>
        <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
        <div class="pov">POV: your AI<br />said it's <span class="y">done.</span></div>
      </div>
      <div class="stage">
        <div class="toast"><div class="chk"><svg class="ico" viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6.5"/></svg></div><div class="h">Order saved</div></div>
        <div class="peel">what Iris saw underneath</div>
        <div class="truth">
          <div class="r"><svg class="ico" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg> POST /api/order &rarr; <b>401</b></div>
          <div class="r"><svg class="ico" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg> charge never went through</div>
        </div>
      </div>
      <div class="end">
        <div class="qa">Let your AI <span class="c">check its own work.</span></div>
        <div class="coords"><span class="code">syrin.ai/iris</span></div>
      </div>
    </div>
  </div>
</body></html>
