<!--SIZE:1600x900-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1600px;height:900px}
  .card{width:1600px;height:900px;padding:var(--s16)}
  .layer{justify-content:space-between;align-items:center;text-align:center}
  .brand{align-self:center}
  .mid{display:flex;flex-direction:column;align-items:center;gap:var(--s7)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.035em;line-height:1.0;font-size:104px}
  h1 .hi{--hi:rgba(95,217,245,.32)}
  .pill{display:inline-flex;align-items:center;gap:var(--s3);background:rgba(255,255,255,.06);border:1px solid rgba(95,217,245,.4);
    border-radius:var(--r4);padding:var(--s5) var(--s8);font-family:var(--mono);font-size:var(--t-base);font-weight:600}
  .pill .code{color:var(--cyan)}
  .works{display:flex;align-items:center;gap:var(--s3);color:var(--faint);font-size:var(--t-xs)}
  .tool{border:1px solid rgba(255,255,255,.14);border-radius:var(--rpill);padding:var(--s2) var(--s4);font-weight:600;color:var(--muted)}
  .bottom{display:flex;align-items:center;justify-content:space-between;width:100%}
  .meta{display:flex;gap:var(--s4);color:var(--faint);font-size:var(--t-xs);font-weight:600}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <div class="mid">
        <h1>Stop being your<br />AI's <span class="hi">QA.</span></h1>
        <div class="pill"><span class="code">npm i -D @syrin/iris</span></div>
        <div class="works">works with <span class="tool">Claude Code</span><span class="tool">Cursor</span><span class="tool">Codex</span><span class="tool">Antigravity</span></div>
      </div>
      <div class="bottom">
        <span class="meta">open source</span>
        <span style="font-family:var(--mono);font-size:var(--t-base);font-weight:700;color:var(--cyan)">syrin.ai/iris</span>
        <span class="meta">MIT · dev-only</span>
      </div>
    </div>
  </div>
</body></html>
