<!--SIZE:1080x1350-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1350px}
  .card{width:1080px;height:1350px;padding:var(--s16)}
  .top{display:flex;align-items:flex-start;justify-content:space-between}
  .wanted{font-family:var(--sans);font-weight:800;font-size:var(--t-md);letter-spacing:.06em;color:var(--red);text-transform:uppercase}
  .mid{margin:auto 0;display:flex;flex-direction:column;gap:var(--s10)}
  .frame{border:1.5px solid rgba(255,255,255,.14);border-radius:var(--r6);padding:var(--s12) var(--s8);
    background:rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:center;gap:var(--s5);position:relative}
  .mug{font-family:var(--sans);font-weight:800;font-size:200px;letter-spacing:-.04em;line-height:.9;display:flex;align-items:center;gap:var(--s4)}
  .mug .chk{width:96px;height:96px;border-radius:50%;background:var(--green);color:#06231a;display:flex;align-items:center;justify-content:center;flex:none}
  .mug .chk .ico{width:56px;height:56px;stroke-width:3}
  .alias{font-family:var(--mono);font-size:var(--t-sm);color:var(--faint)}
  .rap{display:flex;flex-direction:column;gap:var(--s4)}
  .rap .row{display:flex;gap:var(--s4);font-size:var(--t-base)}
  .rap .lab{color:var(--faint);width:160px;flex:none;font-family:var(--mono);font-size:var(--t-mono);padding-top:4px}
  .rap .val{font-weight:600}
  .rap .val b{color:var(--red)}
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
  .tag{font-family:var(--mono);font-size:var(--t-mono);font-weight:600;color:var(--cyan)}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer">
      <div class="top">
        <span class="wanted">Most wanted</span>
        <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      </div>
      <div class="mid">
        <div class="frame">
          <div class="mug"><span class="chk"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12.5l5 5L20 6.5"/></svg></span>done</div>
          <div class="alias">a.k.a. "it works now" · "should be fine" · "shipped it"</div>
        </div>
        <div class="rap">
          <div class="row"><span class="lab">wanted for</span><span class="val"><b>shipping broken code while claiming success</b></span></div>
          <div class="row"><span class="lab">last seen</span><span class="val">in your AI's last message</span></div>
          <div class="row"><span class="lab">apprehended by</span><span class="val">Iris</span></div>
        </div>
      </div>
      <div class="foot">
        <span class="tag">#DoneIsALie</span>
        <span class="url" style="font-family:var(--mono);font-size:var(--t-mono);color:var(--faint);font-weight:600">syrin.ai/iris</span>
      </div>
    </div>
  </div>
</body></html>
