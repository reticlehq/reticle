<!--SIZE:1080x1350-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1350px}
  .card{width:1080px;height:1350px;padding:var(--s16)}
  .pov{font-family:var(--mono);font-size:var(--t-sm);font-weight:700;color:var(--amber);letter-spacing:.04em;margin-top:var(--s8)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;line-height:1.08;font-size:78px;margin-top:var(--s5)}
  h1 .hi{--hi:rgba(255,107,134,.34)}
  .mid{margin:auto 0}
  .sub{font-size:var(--t-md);color:var(--muted);line-height:1.5;margin-top:var(--s8);max-width:820px}
  .sub b{color:var(--cyan);font-weight:600}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer" style="justify-content:space-between">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <div class="mid">
        <div class="pov">POV: it's 11pm</div>
        <h1>You're clicking through your own app for the <span class="hi">40th time</span> tonight,</h1>
        <p class="sub">making sure the AI didn't quietly break checkout again. <b>Iris does this on every edit, so you don't have to.</b></p>
      </div>
      <div class="coords"><span>go to bed. your agent's got the QA.</span><span class="dot"></span><span class="code">syrin.ai/iris</span></div>
    </div>
  </div>
</body></html>
