<!--SIZE:1080x1080-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1080px}
  .card{width:1080px;height:1080px;padding:var(--s16)}
  .q{font-size:var(--t-sm);font-weight:600;color:var(--muted);margin-top:var(--s12)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;line-height:1.04;font-size:84px;margin-top:var(--s4)}
  .two{margin:auto 0;display:flex;flex-direction:column;gap:var(--s5)}
  .c{display:flex;align-items:center;gap:var(--s6);border-radius:var(--r5);padding:var(--s7)}
  .pw{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
  .ir{background:rgba(95,217,245,.12);border:1px solid rgba(95,217,245,.32)}
  .badge{flex:none;width:60px;height:60px;border-radius:var(--r4);display:flex;align-items:center;justify-content:center}
  .pw .badge{background:rgba(255,255,255,.07);color:var(--muted)}
  .ir .badge{background:rgba(95,217,245,.18);color:var(--cyan)}
  .badge .ico{width:32px;height:32px}
  .h{font-weight:700;font-size:var(--t-base);letter-spacing:-.02em}
  .d{color:var(--muted);font-size:var(--t-xs);margin-top:2px;line-height:1.45}
  .punch{font-weight:700;font-size:var(--t-md);letter-spacing:-.02em;text-align:center}
  .punch .c2{color:var(--cyan)}
  .foot{justify-content:center}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer" style="justify-content:space-between">
      <div>
        <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
        <div class="q">but Playwright already exists?</div>
        <h1>So why Iris?</h1>
      </div>
      <div class="two">
        <div class="c pw"><div class="badge"><svg class="ico" viewBox="0 0 24 24"><path d="M5 3l5 16 2.2-6.8L19 10z"/></svg></div><div><div class="h">Playwright drives the browser</div><div class="d">a separate browser, tests you write and maintain</div></div></div>
        <div class="c ir"><div class="badge"><svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5L16 9"/></svg></div><div><div class="h">Iris gives the verdict</div><div class="d">checks your real app, points at the file, ~100 tokens</div></div></div>
      </div>
      <div class="punch">Drive with one. <span class="c2">Verify with Iris.</span></div>
      <div class="foot coords"><span class="code">syrin.ai/iris</span></div>
    </div>
  </div>
</body></html>
