<!--SIZE:1080x1350-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1350px}
  .card{width:1080px;height:1350px;padding:var(--s16)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;line-height:1.06;font-size:80px;margin-top:var(--s12)}
  .loop{margin:auto 0;display:flex;flex-direction:column;gap:var(--s4)}
  .b{display:flex;align-items:center;gap:var(--s6)}
  .v{flex:none;width:172px;text-align:center;font-family:var(--mono);font-size:var(--t-sm);font-weight:700;
    color:#0b0a16;background:var(--cyan);border-radius:var(--r3);padding:var(--s3) var(--s4)}
  .b:nth-child(2) .v{background:var(--iris-bright)} .b:nth-child(3) .v{background:var(--green)} .b:nth-child(4) .v{background:var(--amber)}
  .h{font-weight:700;font-size:var(--t-base);letter-spacing:-.02em}
  .d{color:var(--muted);font-size:var(--t-xs);margin-top:2px}
  .foot{margin-top:var(--s12)}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <h1>The whole loop,<br />four words.</h1>
      <div class="loop">
        <div class="b"><div class="v">look</div><div><div class="h">See the page</div><div class="d">what's on screen right now</div></div></div>
        <div class="b"><div class="v">act</div><div><div class="h">Click, type, submit</div><div class="d">like a real user would</div></div></div>
        <div class="b"><div class="v">observe</div><div><div class="h">What just happened?</div><div class="d">network, errors, app state</div></div></div>
        <div class="b"><div class="v">assert</div><div><div class="h">Did it actually work?</div><div class="d">a verdict, with proof</div></div></div>
      </div>
      <div class="foot coords"><span>how Iris works</span><span class="dot"></span><span class="code">syrin.ai/iris</span></div>
    </div>
  </div>
</body></html>
