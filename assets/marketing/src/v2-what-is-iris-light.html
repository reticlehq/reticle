<!--SIZE:1080x1080-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1080px}
  .card{width:1080px;height:1080px;padding:var(--s16)}
  .brand .prod{color:var(--ink-on-light)}
  .mid{margin:auto 0;display:flex;flex-direction:column;gap:var(--s7)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.035em;line-height:1.06;font-size:108px;color:var(--ink-on-light)}
  h1 .hi{--hi:rgba(255,150,116,.62)}
  .lead{max-width:760px;font-size:var(--t-md);color:var(--muted-on-light)}
  .lead b{color:var(--ink-on-light);font-weight:600}
  .coords{color:var(--muted-on-light)}
  .coords .code{color:#5b4bff}
</style></head><body>
  <div class="card bg-light">
    <div class="grain"></div>
    <div class="layer" style="justify-content:space-between">
      <div class="brand"><img src="../../wordmark-black.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <div class="mid">
        <span class="eyebrow" style="color:#5b4bff">so, what is it?</span>
        <h1>Iris checks<br />your AI's <span class="hi">work.</span></h1>
        <p class="lead">Your agent builds it. <b>Iris checks it actually works</b> in the running app.</p>
      </div>
      <div class="coords"><span>syrin.ai/iris</span><span class="dot"></span><span class="code">@syrin/iris</span></div>
    </div>
  </div>
</body></html>
