<!--SIZE:1080x1350-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1350px}
  .card{width:1080px;height:1350px;padding:var(--s16)}
  .mid{margin:auto 0;display:flex;flex-direction:column;gap:var(--s10)}
  .block .k{font-size:var(--t-sm);font-weight:600;color:var(--muted);margin-bottom:var(--s3)}
  .l1{font-family:var(--sans);font-weight:800;letter-spacing:-.035em;line-height:.98;font-size:92px}
  .l1 .x{color:var(--cyan)}
  .l2{font-family:var(--sans);font-weight:800;letter-spacing:-.035em;line-height:.98;font-size:92px}
  .l2 .b{color:var(--red)}
  .sub{font-size:var(--t-md);color:var(--muted);line-height:1.5;max-width:840px}
  .sub b{color:var(--ink);font-weight:600}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer" style="justify-content:space-between">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <div class="mid">
        <span class="eyebrow" style="color:var(--red)">an uncomfortable truth about AI coding</span>
        <div class="block"><div class="k">Writing the code</div><div class="l1">Now <span class="x">10× faster.</span></div></div>
        <div class="block"><div class="k">Knowing it actually works</div><div class="l2">Still <span class="b">by hand.</span></div></div>
        <p class="sub">The bottleneck didn't disappear when AI started writing the code. <b>It just moved to you.</b></p>
      </div>
      <div class="coords"><span>we're fixing the second half</span><span class="dot"></span><span class="code">syrin.ai/iris</span></div>
    </div>
  </div>
</body></html>
