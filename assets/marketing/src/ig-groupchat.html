<!--SIZE:1080x1350-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1350px}
  .card{width:1080px;height:1350px;padding:var(--s16)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;line-height:1.04;font-size:58px;margin-top:var(--s8)}
  .chat{margin:auto 0;display:flex;flex-direction:column;gap:var(--s4)}
  .m{display:flex;gap:var(--s3);align-items:flex-end;max-width:80%}
  .m.you{align-self:flex-end;flex-direction:row-reverse}
  .av{flex:none;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--t-sm)}
  .av.u{background:rgba(255,255,255,.12);color:var(--ink)}
  .av.y{background:var(--iris-bright);color:#0b0a16}
  .bub{padding:var(--s4) var(--s5);border-radius:var(--r5);font-size:var(--t-base);font-weight:500;line-height:1.35}
  .m.user .bub{background:rgba(255,255,255,.08);border-bottom-left-radius:var(--s2)}
  .m.you .bub{background:rgba(139,123,255,.18);border-bottom-right-radius:var(--s2)}
  .iris{align-self:center;margin-top:var(--s5);background:rgba(95,217,245,.1);border:1px solid rgba(95,217,245,.34);
    border-radius:var(--r5);padding:var(--s5) var(--s6);text-align:center;max-width:90%}
  .iris .who{font-family:var(--mono);font-size:var(--t-mono);color:var(--cyan);font-weight:700;margin-bottom:var(--s2)}
  .iris .t{font-size:var(--t-base);font-weight:600}
  .foot{margin-top:var(--s10);justify-content:center}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <h1>Every vibe coder,<br />eventually.</h1>
      <div class="chat">
        <div class="m user"><span class="av u">U</span><span class="bub">the checkout's broken again</span></div>
        <div class="m you"><span class="av y">Y</span><span class="bub">weird, it worked when I built it</span></div>
        <div class="m you"><span class="av y">Y</span><span class="bub">...did I actually test it?</span></div>
        <div class="iris"><div class="who">iris</div><div class="t">I test it every time. So a user isn't the one who finds out.</div></div>
      </div>
      <div class="foot coords"><span>tag the friend who ships on Fridays</span><span class="dot"></span><span class="code">syrin.ai/iris</span></div>
    </div>
  </div>
</body></html>
