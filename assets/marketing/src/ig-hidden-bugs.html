<!--SIZE:1080x1080-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1080px}
  .card{width:1080px;height:1080px;padding:var(--s16)}
  .mid{margin:auto 0;display:flex;flex-direction:column;gap:var(--s8)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;line-height:1.06;font-size:92px}
  h1 .hi{--hi:rgba(255,107,134,.4)}
  .lead{max-width:780px;font-size:var(--t-md)}
  .lead b{color:var(--ink);font-weight:600}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer" style="justify-content:space-between">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <div class="mid">
        <span class="eyebrow">hidden bugs</span>
        <h1>Some bugs never<br />show up <span class="hi">on screen.</span></h1>
        <p class="lead">The 401. The console error. The webhook that never fired. A screenshot misses all of them. <b>Iris catches them before a user does.</b></p>
      </div>
      <div class="coords"><span class="code">syrin.ai/iris</span></div>
    </div>
  </div>
</body></html>
