<!--SIZE:1080x1080-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1080px}
  .card{width:1080px;height:1080px;padding:var(--s16)}
  .head{display:flex;align-items:center;justify-content:space-between}
  .ep{font-family:var(--mono);font-size:var(--t-mono);font-weight:700;color:var(--amber)}
  .mid{margin:auto 0;display:flex;flex-direction:column;gap:var(--s6)}
  .series{font-size:var(--t-sm);font-weight:600;color:var(--muted)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.04em;line-height:1.0;font-size:132px}
  h1 .q{color:var(--red)}
  .real{font-size:var(--t-base);line-height:1.55}
  .real b{color:var(--ink);font-weight:600}
  .real .m{font-family:var(--mono);color:var(--red)}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer" style="justify-content:space-between">
      <div class="head"><div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div><span class="ep">EP. 01</span></div>
      <div class="mid">
        <div class="series">things your AI lies about</div>
        <h1>"It <span class="q">works.</span>"</h1>
        <p class="real"><b>It did not work.</b> <span class="m">POST /api/order &rarr; 401</span>, behind a green check. Iris is the one who tells you.</p>
      </div>
      <div class="coords"><span>up next: "no errors"</span><span class="dot"></span><span class="code">syrin.ai/iris</span></div>
    </div>
  </div>
</body></html>
