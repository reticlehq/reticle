<!--SIZE:1080x1350-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1350px}
  .card{width:1080px;height:1350px;padding:var(--s16)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;line-height:1.06;font-size:84px;margin-top:var(--s14)}
  .rows{margin:auto 0;display:flex;flex-direction:column;gap:var(--s5)}
  .row{display:flex;align-items:center;gap:var(--s6)}
  .mark{flex:none;width:88px;height:88px;border-radius:var(--r5);display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
  .mark .ico{width:46px;height:46px;stroke-width:2.2}
  .bubble{font-family:var(--sans);font-weight:700;font-size:var(--t-md);letter-spacing:-.02em;
    background:#fbfbff;color:#15131f;border-radius:var(--r5);padding:var(--s5) var(--s6)}
  .bubble.no{background:#ffe1e7;color:#a8132f}
  .bubble.yes{background:#d7f7ea;color:#0a6b46}
  .foot{margin-top:var(--s14)}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <h1>Explain it<br />like I'm five.</h1>
      <div class="rows">
        <div class="row">
          <div class="mark" style="color:var(--muted)"><svg class="ico" viewBox="0 0 24 24"><path d="M3 9c3 3.6 15 3.6 18 0"/><path d="M5.5 12l-1.2 2.2M9 13.4l-.6 2.4M15 13.4l.6 2.4M18.5 12l1.2 2.2"/></svg></div>
          <div class="bubble">Your AI: "I drew a cat."</div>
        </div>
        <div class="row">
          <div class="mark" style="color:var(--red)"><svg class="ico" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M13 3c3 0 5 2 6 4s4 2 4 5-2 4-4 5-2 4-6 4-5-2-8-3-5-1-5-4 2-3 3-6 4-3 6-3 3-1 4-1z" opacity=".92"/></svg></div>
          <div class="bubble no">It drew a blob.</div>
        </div>
        <div class="row">
          <div class="mark" style="color:var(--green)"><svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5L16 9"/></svg></div>
          <div class="bubble yes">Iris checks. Now it's a cat.</div>
        </div>
      </div>
      <div class="foot coords"><span>Iris checks your AI's work</span><span class="dot"></span><span class="code">syrin.ai/iris</span></div>
    </div>
  </div>
</body></html>
