<!--SIZE:1080x1350-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1350px}
  .card{width:1080px;height:1350px;padding:var(--s16)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;line-height:1.04;font-size:74px;margin-top:var(--s10)}
  h1 .hi{--hi:rgba(95,217,245,.32)}
  .bars{margin:auto 0;display:flex;flex-direction:column;gap:var(--s8)}
  .b .lab{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--s3)}
  .b .name{font-size:var(--t-base);font-weight:600}
  .b .meta{font-family:var(--mono);font-size:var(--t-mono);color:var(--faint)}
  .track{height:48px;border-radius:var(--r3);background:rgba(255,255,255,.06);overflow:hidden}
  .fill{height:100%;border-radius:var(--r3);display:flex;align-items:center;padding-left:var(--s5);font-family:var(--mono);font-size:var(--t-mono);font-weight:600;color:#08070d}
  .f-write{width:100%;background:linear-gradient(90deg,var(--cyan),var(--iris-bright))}
  .f-verify{width:22%;background:var(--red);color:#fff}
  .sub{font-size:var(--t-md);color:var(--muted);line-height:1.5}
  .sub b{color:var(--ink);font-weight:600}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer" style="justify-content:space-between">
      <div>
        <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
        <h1>The bottleneck moved.<br />It's not writing code.<br />It's <span class="hi">trusting it.</span></h1>
      </div>
      <div class="bars">
        <div class="b"><div class="lab"><span class="name">Writing the feature</span><span class="meta">seconds, with AI</span></div><div class="track"><div class="fill f-write">instant</div></div></div>
        <div class="b"><div class="lab"><span class="name">Knowing it works</span><span class="meta">still manual</span></div><div class="track"><div class="fill f-verify">you, clicking</div></div></div>
      </div>
      <p class="sub">AI closed the first gap. <b>Iris closes the second</b>, so your agent verifies its own work.</p>
    </div>
  </div>
</body></html>
