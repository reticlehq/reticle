<!--SIZE:1600x900-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1600px;height:900px}
  .card{width:1600px;height:900px;padding:var(--s16)}
  .brand .prod{color:var(--ink-on-light)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.035em;line-height:1.02;font-size:80px;color:var(--ink-on-light);margin-top:var(--s8)}
  h1 .hi{--hi:rgba(255,150,116,.6)}
  .loop{margin:auto 0;display:flex;align-items:stretch;gap:var(--s3)}
  .node{flex:1;background:rgba(255,255,255,.66);border:1px solid rgba(20,19,31,.1);border-radius:var(--r5);
    padding:var(--s6);display:flex;flex-direction:column;gap:var(--s2);box-shadow:0 16px 40px rgba(40,30,80,.08)}
  .node .v{font-family:var(--mono);font-size:var(--t-sm);font-weight:700;color:#5b4bff}
  .node .h{font-weight:700;font-size:var(--t-base);color:var(--ink-on-light);letter-spacing:-.02em}
  .node .d{color:var(--muted-on-light);font-size:var(--t-xs)}
  .arrow{flex:none;display:flex;align-items:center;color:#b3aec6}
  .arrow .ico{width:30px;height:30px;color:#5b4bff}
  .coords{color:var(--muted-on-light)} .coords .code{color:#5b4bff}
</style></head><body>
  <div class="card bg-light">
    <div class="grain"></div>
    <div class="layer" style="justify-content:space-between">
      <div>
        <div class="brand"><img src="../../wordmark-black.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
        <h1>So your agent can<br />check its <span class="hi">own work.</span></h1>
      </div>
      <div class="loop">
        <div class="node"><span class="v">look</span><span class="h">See the page</span><span class="d">what's on screen now</span></div>
        <div class="arrow"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
        <div class="node"><span class="v">act</span><span class="h">Click, type, submit</span><span class="d">like a real user</span></div>
        <div class="arrow"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
        <div class="node"><span class="v">observe</span><span class="h">What happened?</span><span class="d">network, errors, state</span></div>
        <div class="arrow"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
        <div class="node"><span class="v">assert</span><span class="h">Did it work?</span><span class="d">a verdict, with proof</span></div>
      </div>
      <div class="coords"><span>this is the whole loop</span><span class="dot"></span><span class="code">syrin.ai/iris</span></div>
    </div>
  </div>
</body></html>
