<!--SIZE:1080x1350-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1350px}
  .card{width:1080px;height:1350px;padding:var(--s16)}
  .mid{margin:auto 0;display:flex;flex-direction:column;gap:var(--s8)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;line-height:1.08;font-size:100px}
  h1 .g{color:var(--cyan)}
  .tools{display:flex;flex-wrap:wrap;gap:var(--s3)}
  .tool{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);border-radius:var(--rpill);
    padding:var(--s3) var(--s5);font-size:var(--t-xs);font-weight:600;color:var(--muted)}
  .lead{max-width:840px;font-size:var(--t-md)}
  .lead b{color:var(--ink);font-weight:600}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer" style="justify-content:space-between">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <div class="mid">
        <h1>AI can build<br />your whole app.<br /><span class="g">It can't tell you<br />it works.</span></h1>
        <div class="tools">
          <span class="tool">Claude Code</span><span class="tool">Cursor</span><span class="tool">Codex</span><span class="tool">Antigravity</span>
        </div>
        <p class="lead">They write the code. You end up clicking around to check it by hand. <b>Iris closes that gap.</b></p>
      </div>
      <div class="coords"><span>syrin.ai/iris</span><span class="dot"></span><span class="code">npm i -D @syrin/iris</span></div>
    </div>
  </div>
</body></html>
