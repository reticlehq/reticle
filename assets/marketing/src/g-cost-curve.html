<!--SIZE:1600x1000-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1600px;height:1000px}
  .card{width:1600px;height:1000px;padding:var(--s16)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;line-height:1.04;font-size:58px;margin-top:var(--s5)}
  h1 .hi{--hi:rgba(95,217,245,.32)}
  .wrap{margin:auto 0;flex:1;display:flex;gap:var(--s5);max-height:600px}
  .yaxis{display:flex;flex-direction:column;justify-content:space-between;padding:6px 0 40px;text-align:right;color:var(--faint);font-family:var(--mono);font-size:var(--t-mono);font-weight:500}
  .chart{flex:1;position:relative}
  svg{width:100%;height:100%;display:block}
  .leg{position:absolute;left:36px;top:8px;display:flex;flex-direction:column;gap:var(--s3)}
  .leg div{display:flex;align-items:center;gap:var(--s3);font-size:var(--t-sm);font-weight:600}
  .leg .sw{width:28px;height:5px;border-radius:3px}
  .tagpw{position:absolute;left:34%;top:30%;color:var(--red);font-family:var(--sans);font-weight:800;font-size:var(--t-lg)}
  .tagpw small{display:block;color:var(--faint);font-family:var(--mono);font-size:16px;font-weight:500;margin-top:2px}
  .tagir{position:absolute;right:8px;bottom:58px;color:var(--cyan);font-family:var(--sans);font-weight:800;font-size:var(--t-lg)}
  .tagir small{display:block;color:var(--faint);font-family:var(--mono);font-size:16px;font-weight:500;margin-top:2px}
  .foot{margin-top:var(--s5)}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <span class="tag-solution" style="margin-top:var(--s8);display:inline-flex">cheap enough for every edit</span>
      <h1>Tokens add up. <span class="hi">Iris doesn't.</span></h1>
      <div class="wrap">
        <div class="yaxis"><span>150k</span><span>112k</span><span>75k</span><span>37k</span><span>0</span></div>
        <div class="chart">
          <div class="leg"><div><span class="sw" style="background:var(--red)"></span> Full-tree snapshot</div><div><span class="sw" style="background:var(--cyan)"></span> Iris verify loop</div></div>
          <div class="tagpw">~146k<small>full tree, 20 steps</small></div>
          <div class="tagir">~2,000<small>Iris, 20 steps</small></div>
          <svg viewBox="0 0 1300 520" preserveAspectRatio="none">
            <defs>
              <linearGradient id="pw" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff6b86" stop-opacity=".26"/><stop offset="1" stop-color="#ff6b86" stop-opacity="0"/></linearGradient>
            </defs>
            <g stroke="rgba(255,255,255,.08)" stroke-width="1"><line x1="0" y1="8" x2="1300" y2="8"/><line x1="0" y1="136" x2="1300" y2="136"/><line x1="0" y1="264" x2="1300" y2="264"/><line x1="0" y1="392" x2="1300" y2="392"/><line x1="0" y1="512" x2="1300" y2="512"/></g>
            <path d="M0,512 L325,386 L650,260 L975,134 L1300,8 L1300,512 Z" fill="url(#pw)"/>
            <polyline points="0,512 325,386 650,260 975,134 1300,8" fill="none" stroke="#ff6b86" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="0,512 325,511 650,510 975,509 1300,508" fill="none" stroke="#5fd9f5" stroke-width="7" stroke-linecap="round"/>
            <circle cx="1300" cy="8" r="9" fill="#ff6b86"/><circle cx="1300" cy="508" r="9" fill="#5fd9f5"/>
          </svg>
        </div>
      </div>
      <div class="foot coords"><span>cumulative tokens across a 20-step flow</span><span class="dot"></span><span class="code">syrin.ai/iris</span></div>
    </div>
  </div>
</body></html>
