<!--SIZE:1080x1350-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1350px}
  .card{width:1080px;height:1350px;padding:var(--s16)}
  .wm{position:absolute;left:-40px;top:300px;font-family:var(--sans);font-weight:800;font-size:420px;
    letter-spacing:-.04em;color:transparent;-webkit-text-stroke:2px rgba(255,255,255,.06);z-index:0;line-height:1}
  .top{display:flex;align-items:center;justify-content:space-between}
  .count{font-family:var(--mono);font-size:var(--t-sm);font-weight:700;color:var(--red);border:1px solid rgba(255,107,134,.4);
    background:rgba(255,107,134,.08);border-radius:var(--rpill);padding:var(--s2) var(--s5)}
  .mid{margin:auto 0}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.035em;line-height:1.04;font-size:96px}
  h1 .hi{--hi:rgba(255,107,134,.32)}
  .foot{display:flex;align-items:center;justify-content:space-between}
  .tag{font-family:var(--mono);font-size:var(--t-mono);font-weight:600;color:var(--cyan)}
  .url{font-family:var(--mono);font-size:var(--t-mono);color:var(--faint);font-weight:600}
</style></head><body>
  <div class="card bg-dark">
    <div class="wm">done</div>
    <div class="grain"></div>
    <div class="layer" style="justify-content:space-between">
      <div class="top">
        <span class="count">T minus 3 days</span>
        <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      </div>
      <div class="mid">
        <h1>In 3 days,<br />your AI loses its<br />favorite <span class="hi">excuse.</span></h1>
      </div>
      <div class="foot">
        <span class="tag">#DoneIsALie</span>
        <span class="url">syrin.ai/iris</span>
      </div>
    </div>
  </div>
</body></html>
