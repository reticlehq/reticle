<!--SIZE:1080x1350-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="_system.css" /><style>
  html,body{width:1080px;height:1350px}
  .card{width:1080px;height:1350px;padding:var(--s16)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;line-height:1.06;font-size:80px;margin-top:var(--s12)}
  .steps{margin:auto 0;display:flex;flex-direction:column;gap:var(--s5)}
  .step{display:flex;gap:var(--s5);align-items:center}
  .num{flex:none;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:var(--t-sm);color:#0b0a16}
  .n1{background:var(--red)} .n2{background:var(--amber)} .n3{background:var(--green)}
  .panel{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--r5);padding:var(--s6)}
  .h{font-weight:700;font-size:var(--t-base);letter-spacing:-.02em}
  .d{color:var(--muted);font-size:var(--t-xs);margin-top:var(--s2);line-height:1.5}
  .foot{margin-top:var(--s12)}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <h1>How "done"<br />becomes real.</h1>
      <div class="steps">
        <div class="step"><div class="num n1">1</div><div class="panel"><div class="h">"It's done."</div><div class="d">the toast says success. the API returned 401.</div></div></div>
        <div class="step"><div class="num n2">2</div><div class="panel"><div class="h">Iris asks for proof.</div><div class="d">shows the 401, the error, the file to fix.</div></div></div>
        <div class="step"><div class="num n3">3</div><div class="panel"><div class="h">One line later, it passes.</div><div class="d">verified. you shipped nothing broken.</div></div></div>
      </div>
      <div class="foot coords"><span>your AI, now with a verdict</span><span class="dot"></span><span class="code">syrin.ai/iris</span></div>
    </div>
  </div>
</body></html>
