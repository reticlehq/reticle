<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../src/_system.css" /><style>
  html,body{width:1920px;height:1080px;margin:0}
  .dcard{width:1920px;height:1080px;position:relative;overflow:hidden;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
  .layer{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:var(--s8);padding:var(--s20);opacity:0}
  .dcard.go .layer{animation:cardin .7s cubic-bezier(.2,.7,.2,1) both}
  @keyframes cardin{0%{opacity:0;transform:translateY(26px) scale(.99)}100%{opacity:1;transform:none}}
  .eyebrow2{font-family:var(--mono);font-size:var(--t-sm);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.035em;line-height:1.02;font-size:104px}
  .sub{font-size:var(--t-md);color:var(--muted);max-width:1200px;line-height:1.4}
  .lock{display:flex;align-items:center;gap:var(--s3)}.lock img{height:44px}.lock .sep{color:var(--faint);font-size:34px;font-weight:300}.lock .prod{font-size:34px;font-weight:700}
  .cta{font-family:var(--mono);font-size:var(--t-md);font-weight:600;color:var(--cyan);border:1px solid rgba(95,217,245,.4);background:rgba(95,217,245,.08);border-radius:var(--rpill);padding:var(--s4) var(--s8)}
  .url{font-family:var(--mono);font-size:var(--t-base);color:var(--faint);font-weight:600}
</style></head><body>
  <div class="dcard bg-dark"><div class="grain"></div><div class="layer" id="L"></div></div>
  <script>
    const p = new URLSearchParams(location.search);
    const ac = { red:'var(--red)', cyan:'var(--cyan)', green:'var(--green)', amber:'var(--amber)' }[p.get('accent')||'cyan'];
    const esc = (s)=> (s||'').replace(/</g,'&lt;');
    const L = document.getElementById('L');
    const mode = p.get('mode')||'hook';
    let html = '';
    if (p.get('eyebrow')) html += `<div class="eyebrow2" style="color:${ac}">${esc(p.get('eyebrow'))}</div>`;
    const l1 = esc(p.get('l1')), l2 = esc(p.get('l2'));
    html += `<h1>${l1}${l2?'<br>'+`<span style="color:${ac}">${l2}</span>`:''}</h1>`;
    if (p.get('sub')) html += `<div class="sub">${esc(p.get('sub'))}</div>`;
    if (mode==='outro') {
      html += `<div class="lock"><img src="../../wordmark-white.svg"/><span class="sep">/</span><span class="prod">Iris</span></div>`;
      if (p.get('cta')) html += `<div class="cta">${esc(p.get('cta'))}</div>`;
      html += `<div class="url">syrin.ai/iris</div>`;
    }
    L.innerHTML = html;
  </script>
</body></html>
