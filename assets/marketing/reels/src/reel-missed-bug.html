<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../../src/_system.css" /><style>
  html,body{width:1080px;height:1920px;margin:0}
  h2 .g{color:var(--green)} h2 .r{color:var(--red)}
  h2 .hi{--hi:rgba(255,107,134,.34)}
  .mail{background:#fbfbff;color:#15131f;border-radius:var(--r6);padding:var(--s8);width:760px;text-align:left;box-shadow:0 40px 100px rgba(0,0,0,.5)}
  .mail .f{font-family:var(--mono);font-size:var(--t-sm);color:#8a8aa2}
  .mail .s{font-weight:700;font-size:var(--t-md);margin-top:var(--s3)}
</style></head><body>
  <div class="reel bg-dark">
    <div class="grain"></div>
    <div class="scene" style="animation:sc 2.7s 0s both"><div class="sm">you asked Claude Code to fix signup</div></div>
    <div class="scene" style="animation:sc 2.7s 2.2s both"><h2>It said:</h2><div class="big g">done.</div></div>
    <div class="scene" style="animation:sc 2.7s 4.4s both"><h2>You clicked around.</h2><div class="sm">looked fine.</div></div>
    <div class="scene" style="animation:sc 2.7s 6.6s both"><h2>So you<br />shipped it.</h2></div>
    <div class="scene" style="animation:sc 2.7s 8.8s both"><div class="sm">three days later</div><div class="mail"><div class="f">From: a user</div><div class="s">I can't sign up. Is it broken?</div></div></div>
    <div class="scene" style="animation:sc 2.7s 11s both"><h2>The bug was there<br />the <span class="hi">whole time.</span></h2><div class="sm">you just never clicked that one path</div></div>
    <div class="scene" style="animation:hold2 2.8s 13.2s both"><h2>Iris checks<br /><span style="color:var(--cyan)">every path.</span></h2><div class="lock"><img src="../../../wordmark-white.svg" /><span class="sep">/</span><span class="prod">Iris</span></div><div class="sm" style="color:var(--cyan)">syrin.ai/iris</div></div>
    <div class="prog" style="animation:fill 16s linear both"></div>
  </div>
</body></html>
