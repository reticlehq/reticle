<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../../src/_system.css" /><style>
  .code{font-family:var(--mono);font-size:var(--t-base);line-height:1.9;background:rgba(7,6,14,.7);border:1px solid rgba(255,255,255,.1);border-radius:var(--r5);padding:var(--s7);text-align:left}
  .code .add{color:var(--green);background:rgba(70,214,160,.12);border-radius:var(--r2);padding:2px 8px}
</style></head><body>
  <div class="reel bg-dark">
    <div class="grain"></div>
    <div class="scene" style="animation:sc 2s 0s both"><h2>Your AI says<br />it works.</h2></div>
    <div class="scene" style="animation:sc 2.6s 1.9s both"><div class="vpanel fail"><div class="vh">pass: false</div><div class="l">POST /api/redeploy &rarr; <b>401</b></div><div class="l">signal never fired</div></div></div>
    <div class="scene" style="animation:sc 2.2s 4.4s both"><div class="sm">the one-line fix</div><div class="code"><span class="add">+ authorization: `Bearer ${token}`</span></div></div>
    <div class="scene" style="animation:sc 2.6s 6.5s both"><div class="vpanel pass"><div class="vh">pass: true</div><div class="l">POST /api/redeploy &rarr; <b>200</b></div><div class="l">deploy:redeployed fired</div></div></div>
    <div class="scene" style="animation:sc 2s 9.1s both"><h2>a verdict,<br />with proof.</h2></div>
    <div class="scene" style="animation:hold2 2.6s 10.9s both"><h2 style="color:var(--cyan)">Iris.</h2><div class="lock"><img src="../../../wordmark-white.svg" /><span class="sep">/</span><span class="prod">Iris</span></div><div class="sm" style="color:var(--cyan)">syrin.ai/iris</div></div>
    <div class="prog" style="animation:fill 13.5s linear both"></div>
  </div>
</body></html>
