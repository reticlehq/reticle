<!--SIZE:1200x675-->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../marketing/src/_system.css" />
    <style>
      html,body{width:1200px;height:675px}
      .card{width:1200px;height:675px;padding:var(--s12)}
      .kick{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
      .mid{margin:auto 0;text-align:center;display:flex;flex-direction:column;align-items:center}
      .big{font-weight:800;letter-spacing:-.04em;line-height:.9;font-size:200px;
        background:linear-gradient(95deg,#5fd9f5,#8b7bff,#c08bff);-webkit-background-clip:text;background-clip:text;color:transparent}
      .sub{font-size:var(--t-md);font-weight:700;color:var(--ink);margin-top:var(--s4)}
      .cmp{font-size:var(--t-sm);color:var(--muted);margin-top:var(--s7);display:flex;gap:var(--s6);align-items:center}
      .cmp b{color:#8b9bff} .cmp .vs{color:var(--faint)}
      .pills{display:flex;gap:var(--s5);margin-top:var(--s7)}
      .pill{font-family:var(--mono);font-size:13px;color:var(--muted);border:1px solid var(--hair);border-radius:999px;padding:6px 14px}
      .pill b{color:var(--ink)}
    </style>
  </head>
  <body>
    <div class="card bg-dark"><div class="grain"></div><div class="layer">
      <div class="top"><div class="brand"><img src="../../wordmark-white.svg" alt="Reticle" /></div><span class="kick">testing with a fleet of agents</span></div>
      <div class="mid">
        <div class="big">6.78&times;</div>
        <div class="sub">faster &mdash; one browser, agents verify in parallel</div>
        <div class="cmp"><span><b>Reticle</b> 16 flows in 5.2s &middot; 8 isolated contexts &middot; one Chromium</span><span class="vs">vs</span><span>one&#8209;at&#8209;a&#8209;time 35.4s</span></div>
        <div class="pills"><span class="pill"><b>8</b> concurrent leases</span><span class="pill"><b>~30s</b> saved per batch</span><span class="pill"><b>0</b> cross&#8209;talk &middot; isolated cookies/storage</span></div>
      </div>
      <div class="foot coords"><span>measured &middot; reproducible</span><span class="dot"></span><span class="code">github.com/reticlehq/reticle</span></div>
    </div></div>
  </body>
</html>
