<!--SIZE:1080x1080-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../../marketing/src/_system.css" /><style>
  html,body{width:1080px;height:1080px}
  .card{width:1080px;height:1080px;padding:var(--s16)}
  .kick{margin-top:var(--s8);font-family:var(--mono);font-size:var(--t-mono);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.035em;line-height:1;font-size:84px;margin-top:var(--s3)}
  h1 .hi{--hi:rgba(95,217,245,.32)}
  .pair{margin:auto 0;display:flex;flex-direction:column;gap:var(--s7)}
  .stat{border-radius:var(--r6);padding:var(--s10) var(--s10);display:flex;align-items:center;justify-content:space-between}
  .iris{background:linear-gradient(135deg,rgba(95,217,245,.16),rgba(139,123,255,.1));border:1px solid rgba(139,123,255,.35)}
  .pw{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
  .stat .lab{font-size:var(--t-md);color:var(--muted)} .stat .lab b{color:var(--ink);font-weight:800}
  .stat .lab small{display:block;font-family:var(--mono);font-size:15px;color:var(--faint);margin-top:var(--s2)}
  .stat .n{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;font-size:108px;line-height:1}
  .iris .n{color:var(--cyan)} .pw .n{color:var(--muted)}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <div class="kick">a 20-step verification flow · tokens</div>
      <h1>Same flow.<br />Two <span class="hi">budgets.</span></h1>
      <div class="pair">
        <div class="stat iris"><div class="lab"><b>Iris</b>, run on every edit<small>~100 tokens × 20 steps</small></div><div class="n">~2k</div></div>
        <div class="stat pw"><div class="lab"><b>Full-tree</b> snapshots<small>~7,300 tokens × 20 steps</small></div><div class="n">~146k</div></div>
      </div>
      <div class="foot coords"><span class="code">syrin.ai/iris</span><span class="dot"></span><span class="code">@syrin/iris</span></div>
    </div>
  </div>
</body></html>
