<!--SIZE:1600x480-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../../marketing/src/_system.css" /><style>
  html,body{width:1600px;height:480px}
  .card{width:1600px;height:480px;padding:var(--s12) var(--s16);justify-content:center}
  .layer{justify-content:center}
  .row1{display:flex;align-items:center;justify-content:space-between}
  .row1 .t{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--faint);letter-spacing:.08em;text-transform:uppercase}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.02em;font-size:48px;margin-top:var(--s6)}
  h1 .hi{--hi:rgba(95,217,245,.32)}
  .badges{margin-top:var(--s7);display:flex;flex-wrap:wrap;gap:var(--s3)}
  .b{display:flex;align-items:center;gap:var(--s3);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:var(--rpill);padding:var(--s4) var(--s6);font-size:22px;font-weight:600}
  .b .d{width:10px;height:10px;border-radius:50%}
  .g .d{background:var(--green)} .i .d{background:var(--iris-bright)} .c .d{background:var(--cyan)}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer">
      <div class="row1"><div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div><span class="t">syrin.ai/iris</span></div>
      <h1>Open source, dev-only, and it never leaves your <span class="hi">machine.</span></h1>
      <div class="badges">
        <div class="b g"><span class="d"></span>MIT</div>
        <div class="b g"><span class="d"></span>dev-only</div>
        <div class="b g"><span class="d"></span>localhost-only</div>
        <div class="b g"><span class="d"></span>no telemetry</div>
        <div class="b i"><span class="d"></span>React 18 / 19 + Next.js</div>
        <div class="b c"><span class="d"></span>TypeScript</div>
        <div class="b c"><span class="d"></span>@syrin/iris</div>
      </div>
    </div>
  </div>
</body></html>
