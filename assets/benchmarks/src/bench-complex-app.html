<!--SIZE:1200x675-->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../marketing/src/_system.css" />
    <style>
      html,body{width:1200px;height:675px}
      .card{width:1200px;height:675px;padding:var(--s12)}
      .kick{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
      .mid{margin:auto 0}
      h1{font-weight:800;letter-spacing:-.03em;line-height:1.05;font-size:46px}
      .row{display:flex;gap:var(--s12);align-items:center;margin-top:var(--s6)}
      .bars{flex:1}
      .bar{display:flex;align-items:center;gap:var(--s5);margin:var(--s3) 0}
      .bar .lab{width:230px;text-align:right;font-size:var(--t-xs);color:var(--muted)}
      .bar.win .lab{color:var(--ink);font-weight:700}
      .track{flex:1;height:30px;border-radius:var(--r2);background:rgba(255,255,255,.05);overflow:hidden}
      .fill{height:100%;border-radius:var(--r2);background:rgba(255,255,255,.10)}
      .bar.win .fill{background:linear-gradient(95deg,#ff8a4c,#ffc06e);box-shadow:0 0 30px rgba(255,150,90,.45)}
      .num{width:96px;font-weight:700;font-size:var(--t-xs);color:var(--faint)}
      .bar.win .num{color:#ffa56b}
      .x{width:230px;text-align:center}
      .x .big{font-weight:800;font-size:88px;letter-spacing:-.04em;background:linear-gradient(95deg,#ff8a4c,#ffc06e);-webkit-background-clip:text;background-clip:text;color:transparent}
      .x .cap{font-size:var(--t-xs);color:var(--muted);margin-top:var(--s1)}
      .note{margin-top:var(--s6);font-size:var(--t-xs);color:var(--muted)}
    </style>
  </head>
  <body>
    <div class="card bg-dark"><div class="grain"></div><div class="layer">
      <div class="top"><div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div><span class="kick">real app &middot; tokens per look &middot; lower is better</span></div>
      <div class="mid">
        <h1>Cheapest look at a real app.</h1>
        <div class="row">
          <div class="bars">
            <div class="bar win"><div class="lab">Iris</div><div class="track"><div class="fill" style="width:46.6%"></div></div><div class="num">1,023</div></div>
            <div class="bar"><div class="lab">Chrome DevTools MCP</div><div class="track"><div class="fill" style="width:61.9%"></div></div><div class="num">1,357</div></div>
            <div class="bar"><div class="lab">Playwright MCP</div><div class="track"><div class="fill" style="width:100%"></div></div><div class="num">2,193</div></div>
          </div>
          <div class="x"><div class="big">2.1&times;</div><div class="cap">leaner than<br />Playwright MCP</div></div>
        </div>
        <div class="note">The Syrin dashboard &middot; React 19 &middot; authenticated &middot; live data</div>
      </div>
      <div class="foot coords"><span>measured &middot; reproducible</span><span class="dot"></span><span class="code">github.com/syrin-labs/iris</span></div>
    </div></div>
  </body>
</html>
