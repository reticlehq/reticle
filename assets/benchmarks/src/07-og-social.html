<!--SIZE:1200x630-->
<!doctype html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../../marketing/src/_system.css" /><style>
  html,body{width:1200px;height:630px}
  .card{width:1200px;height:630px;padding:var(--s14) var(--s16)}
  h1{font-family:var(--sans);font-weight:800;letter-spacing:-.03em;line-height:1.04;font-size:64px;margin-top:var(--s8)}
  h1 .hi{--hi:rgba(95,217,245,.32)}
  .sub{color:var(--muted);font-size:var(--t-base);margin-top:var(--s5);max-width:880px;line-height:1.4}
  .chips{display:flex;gap:var(--s4);margin-top:auto}
  .chip{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--r4);padding:var(--s5) var(--s6)}
  .chip .k{font-family:var(--sans);font-weight:800;font-size:34px;letter-spacing:-.02em}
  .chip .v{color:var(--muted);font-size:15px;margin-top:var(--s1);font-family:var(--mono)}
  .c1 .k{color:var(--cyan)} .c2 .k{color:var(--iris-bright)} .c3 .k{color:var(--green)}
  .foot{margin-top:var(--s7)}
</style></head><body>
  <div class="card bg-dark">
    <div class="grain"></div>
    <div class="layer">
      <div class="brand"><img src="../../wordmark-white.svg" alt="Syrin" /><span class="sep">/</span><span class="prod">Iris</span></div>
      <h1>Your AI writes the code.<br />Iris checks it <span class="hi">actually works.</span></h1>
      <div class="sub">A verdict with evidence — from inside your running app, in ~100 tokens. No screenshots.</div>
      <div class="chips">
        <div class="chip c1"><div class="k">~100</div><div class="v">tokens / check</div></div>
        <div class="chip c2"><div class="k">0</div><div class="v">screenshots</div></div>
        <div class="chip c3"><div class="k">file:line</div><div class="v">fix on React</div></div>
      </div>
      <div class="foot coords"><span class="code">syrin.ai/iris</span><span class="dot"></span><span class="code">@syrin/iris</span><span class="dot"></span><span>MIT · dev-only</span></div>
    </div>
  </div>
</body></html>
