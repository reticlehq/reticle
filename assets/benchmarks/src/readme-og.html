<!--SIZE:1280x640-->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../marketing/src/_system.css" />
    <style>
      html,body{width:1280px;height:640px}
      .card{width:1280px;height:640px;padding:64px 72px}
      .kick{font-family:var(--mono);font-size:16px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--faint)}
      .mid{margin:auto 0;display:flex;flex-direction:column;align-items:flex-start}
      .claim{display:inline-flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:14px 20px;font-size:24px;color:var(--ink)}
      .claim b{font-weight:700} .claim .ok{color:#46d6a0;font-weight:800}
      .big{font-weight:800;letter-spacing:-.035em;font-size:104px;line-height:.98;margin-top:24px}
      .big .hi{--hi:rgba(255,148,86,.6)}
      .sub{font-size:27px;line-height:1.45;color:var(--muted);margin-top:28px;max-width:1040px;font-weight:450}
      .sub b{color:#ffa56b;font-weight:700}
    </style>
  </head>
  <body>
    <div class="card bg-dark"><div class="grain"></div><div class="layer">
      <div class="top">
        <div class="brand"><img src="../../wordmark-white.svg" alt="Reticle" /></div>
        <span class="kick">the proof layer for AI agents</span>
      </div>
      <div class="mid">
        <div class="claim"><span>Your AI agent:</span><b>&ldquo;Fixed it<span class="ok">&nbsp;&check;</span>&rdquo;</b></div>
        <div class="big">It never opened<br />the app.</div>
        <div class="sub">Reticle is the <b>proof layer for AI agents</b> — a pass/fail verdict with evidence and the exact <b>file:line</b> to fix. Not a screenshot.</div>
      </div>
      <div class="foot coords"><span>github.com/reticlehq/reticle</span><span class="dot"></span><span>dev-only &middot; localhost-only &middot; no telemetry</span></div>
    </div></div>
  </body>
</html>
