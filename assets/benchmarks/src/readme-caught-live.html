<!--SIZE:1200x675-->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../marketing/src/_system.css" />
    <style>
      html,body{width:1200px;height:675px}
      .card{width:1200px;height:675px;padding:var(--s12)}
      .kick{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
      .mid{margin:auto 0;display:flex;flex-direction:column;align-items:flex-start}
      .big{font-weight:800;letter-spacing:-.03em;font-size:64px;line-height:1.05}
      .panel{font-family:var(--mono);font-size:var(--t-sm);color:#ff8a8a;margin-top:var(--s7);background:rgba(255,90,90,.08);border:1px solid rgba(255,90,90,.20);border-radius:var(--r4);padding:var(--s5) var(--s6);line-height:1.5}
      .panel .sub{color:#caa6a6}
      .line{font-size:var(--t-base);color:var(--muted);margin-top:var(--s7)}
      .line b{color:#ffa56b;font-weight:700}
    </style>
  </head>
  <body>
    <div class="card bg-dark"><div class="grain"></div><div class="layer">
      <div class="top"><div class="brand"><img src="../../wordmark-white.svg" alt="Reticle" /></div><span class="kick">first look &middot; real app</span></div>
      <div class="mid">
        <div class="big">Caught a 500 the page hid.</div>
        <div class="panel">GET /projects &rarr; 500<br /><span class="sub">column "deleted_at" does not exist</span></div>
        <div class="line">Screenshot said: looks fine. <b>One look. No screenshot.</b></div>
      </div>
      <div class="foot coords"><span>measured &middot; reproducible</span><span class="dot"></span><span class="code">github.com/reticlehq/reticle</span></div>
    </div></div>
  </body>
</html>
