name: Feature request
description: Suggest an idea or improvement for Iris
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain or the gap, not just the solution. What can't you do today?
      placeholder: "When my agent verifies a flow, it can't tell whether…"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the ideal behavior, tool, or API look like?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've tried or thought about, and why they fall short.
    validations:
      required: false
  - type: dropdown
    id: persona
    attributes:
      label: Who does this help most?
      options:
        - Solo founder shipping fast
        - Developer doing dev-time testing with an agent
        - QA engineer / SDET
        - Platform / enterprise team
        - Other
    validations:
      required: false
