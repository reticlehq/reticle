name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm audit --audit-level high
      - run: pnpm format:check

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @syrin/iris-e2e --fail-if-no-match exec playwright install --with-deps chromium
      - name: Integration suite (real-Chromium BrowserPool tests)
        run: pnpm test:integration
      - name: Run e2e battery (boots api+demo+next-smoke, drives Iris headless)
        run: pnpm --filter @syrin/iris-e2e --fail-if-no-match run e2e:ci
      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-logs
          path: /tmp/e2e-*.log
          if-no-files-found: ignore
          retention-days: 7
