name: Publish to npm

# Publishes every public @reticlehq/* package (all of them as of v2 — core, browser, react,
# server, vite-plugin, next, babel-plugin, test, eslint-plugin, protocol) when a GitHub Release
# is published, or on manual dispatch. `pnpm -r publish` walks the workspace in dependency order
# and skips any version already on npm, so a partial/failed run is safe to re-trigger.
#
# NPM_TOKEN (an npm "Automation" token) lives in the "Production" GitHub Environment, so
# the job declares `environment: Production` below to bring that secret into scope.
#
# Provenance (the verified "published from GitHub Actions" badge) requires a PUBLIC repo +
# the id-token permission below. If the repo is still private, drop the NPM_CONFIG_PROVENANCE
# line (or make the repo public) or the publish will fail.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Production # NPM_TOKEN lives in this GitHub Environment
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish public packages
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
