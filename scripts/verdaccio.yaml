# Local registry config for testing @reticle/* in a real external app without publishing to npm.
storage: /tmp/reticle-verdaccio-storage
auth:
  htpasswd:
    file: /tmp/reticle-verdaccio-htpasswd
uplinks:
  npmjs:
    url: https://registry.npmjs.org/
packages:
  '@reticle/*':
    access: $all
    publish: $all
    unpublish: $all
  '**':
    access: $all
    publish: $all
    proxy: npmjs
log: { type: stdout, format: pretty, level: warn }
listen: 0.0.0.0:4873
